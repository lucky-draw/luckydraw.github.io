<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Input Numbers</title>

<style>
body{
  background:#ffd400;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:30px;
  border-radius:20px;
  width:350px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
  width:100%;
  padding:15px;
  font-size:20px;
  border:2px solid #0066ff;
  border-radius:10px;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  background:#0066ff;
  color:white;
  font-size:20px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:10px;
}

.list{
  margin-top:15px;
  text-align:left;
}

.item{
  background:#f1f1f1;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

  <h2>Input Numbers</h2>

  <input id="num" placeholder="Enter 6-digit number">

  <button onclick="add()">Add Number</button>

</div>

<script>

let numbers = JSON.parse(localStorage.getItem("numbers")) || [];

function add(){

  let val = document.getElementById("num").value.trim();

  if(val.length !== 6 || isNaN(val)){
    alert("6 digits only");
    return;
  }

  numbers.push(val);

  localStorage.setItem("numbers", JSON.stringify(numbers));

  document.getElementById("num").value = "";

  render();

}

function render(){

  let list = document.getElementById("list");

  list.innerHTML = "";

  numbers.forEach(n => {

    let div = document.createElement("div");

    div.className = "item";

    div.innerText = n;

    list.appendChild(div);

  });

}

render();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Draw Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat',sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at center,#3f0085 0%,#180032 55%,#070010 100%);
    position:relative;
}

/* LIGHTS */

.bg-light{
    position:absolute;
    border-radius:50%;
    filter:blur(70px);
    opacity:.4;
    animation:moveLight 10s ease-in-out infinite alternate;
}

.light1{
    width:350px;
    height:350px;
    background:#ff00ea;
    top:5%;
    left:5%;
}

.light2{
    width:400px;
    height:400px;
    background:#00d9ff;
    bottom:5%;
    right:10%;
    animation-duration:12s;
}

.light3{
    width:300px;
    height:300px;
    background:#ffd000;
    top:40%;
    left:40%;
    animation-duration:14s;
}

@keyframes moveLight{

    0%{
        transform:translate(0,0) scale(1);
    }

    100%{
        transform:translate(60px,-40px) scale(1.2);
    }

}

/* MAIN */

.container{
    text-align:center;
    position:relative;
    z-index:2;
}

/* HEADER */

.header{
    display:inline-block;
    padding:18px 70px 22px;
    border-radius:35px;

    background:
    linear-gradient(to bottom,#7d22ff,#4b00aa);

    border:6px solid #ffcc33;

    box-shadow:
    0 0 30px rgba(255,215,0,.55),
    inset 0 0 18px rgba(255,255,255,.15);
}

.header h1{
    font-size:95px;
    line-height:1;

    color:#ffd84f;
    font-weight:800;

    text-shadow:
    0 5px 0 #8a5500,
    0 0 18px rgba(255,215,0,.8);
}

.header h2{
    color:white;
    font-size:58px;
    letter-spacing:4px;
    margin-top:-5px;
}

/* SLOT */

.slot-wrapper{
    margin-top:45px;

    padding:22px;

    border-radius:45px;

    background:
    linear-gradient(to bottom,#3d006d,#170028);

    border:8px solid #ffcc33;

    box-shadow:
    0 0 35px rgba(255,215,0,.45),
    inset 0 0 15px rgba(255,255,255,.08),
    0 18px 50px rgba(0,0,0,.6);
}

.slot-machine{
    display:flex;
    gap:10px;
    justify-content:center;
}

/* DIGITS */

.digit{
    width:150px;
    height:210px;

    overflow:hidden;

    border-radius:20px;

    position:relative;

    background:
    linear-gradient(to right,
    #014e00 0%,
    #12ff57 50%,
    #014e00 100%);

    border:3px solid rgba(255,255,255,.2);

    box-shadow:
    inset 0 0 20px rgba(255,255,255,.2),
    inset 0 -15px 20px rgba(0,0,0,.4),
    0 0 18px rgba(0,255,100,.5);
}

.numbers{
    position:absolute;
    width:100%;
    top:0;
    left:0;
}

.numbers span{
    width:100%;
    height:210px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:120px;
    font-weight:800;

    color:#ffd84f;

    text-shadow:
    0 4px 0 #9b5d00,
    0 0 15px rgba(255,255,255,.4);
}

/* BUTTON */

button{
    margin-top:45px;

    padding:24px 85px;

    border:none;
    border-radius:25px;

    font-size:36px;
    font-weight:800;

    color:white;

    cursor:pointer;

    background:
    linear-gradient(to bottom,#1dff67,#00a33d);

    border:5px solid #ffd84f;

    box-shadow:
    0 10px 0 #006d25,
    0 0 28px rgba(0,255,120,.5),
    inset 0 0 15px rgba(255,255,255,.2);

    transition:.2s;
}

button:hover{
    transform:translateY(-4px) scale(1.03);
}

button:active{
    transform:translateY(5px);
}

/* MOBILE */

@media(max-width:900px){

    .header h1{
        font-size:45px;
    }

    .header h2{
        font-size:28px;
    }

    .digit{
        width:70px;
        height:100px;
    }

    .numbers span{
        height:100px;
        font-size:55px;
    }

    button{
        font-size:20px;
        padding:16px 40px;
    }

}

</style>
</head>

<body>

<div class="bg-light light1"></div>
<div class="bg-light light2"></div>
<div class="bg-light light3"></div>

<div class="container">

    <div class="header">
        <h1>LUCKY</h1>
        <h2>DRAW</h2>
    </div>

    <div class="slot-wrapper">

        <div class="slot-machine">

            <div class="digit"><div class="numbers"></div></div>
            <div class="digit"><div class="numbers"></div></div>
            <div class="digit"><div class="numbers"></div></div>
            <div class="digit"><div class="numbers"></div></div>
            <div class="digit"><div class="numbers"></div></div>
            <div class="digit"><div class="numbers"></div></div>

        </div>

    </div>

    <button onclick="drawWinner()">
        DRAW WINNER
    </button>

</div>

<script>

/* GET INPUT FROM STORAGE */

function getNumbers(){

    return JSON.parse(
        localStorage.getItem("numbers")
    ) || [];

}

/* CREATE 0-9 */

document.querySelectorAll(".numbers").forEach(box=>{

    let html = "";

    for(let r=0;r<30;r++){

        for(let i=0;i<=9;i++){

            html += `<span>${i}</span>`;

        }

    }

    box.innerHTML = html;

});

/* DRAW FUNCTION */

function drawWinner(){

    let numbers = getNumbers();

    if(numbers.length === 0){

        alert("No numbers found");
        return;

    }

    let winner =
    numbers[numbers.length - 1]
    .toString()
    .padStart(6,"0");

    let digits =
    document.querySelectorAll(".numbers");

    /* SMOOTH SLOT MACHINE EFFECT */

    digits.forEach((d,index)=>{

        let delay = index * 300;

        setTimeout(()=>{

            let position = 0;

            let rolling = setInterval(()=>{

                position += 70;

                d.style.transition =
                "transform .08s cubic-bezier(.25,.46,.45,.94)";

                d.style.transform =
                `translateY(-${position}px)`;

                /* LOOP */

                if(position >= 210 * 250){

                    position = 0;

                    d.style.transition = "none";

                    d.style.transform =
                    `translateY(0px)`;

                }

            },25);

            /* STOP EACH NUMBER */

            setTimeout(()=>{

                clearInterval(rolling);

                let finalNum =
                parseInt(winner[index]);

                let finalPosition =
                (200 * 210) + (finalNum * 210);

                d.style.transition =
                "transform 1.4s cubic-bezier(.08,.82,.17,1)";

                d.style.transform =
                `translateY(-${finalPosition}px)`;

            },3000 + (index * 700));

        },delay);

    });

}

</script>

</body>
</html>
